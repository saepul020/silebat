<div class="master-list-controls">
    <form method="get" class="master-entries-form" data-master-entries-form="true" aria-label="Filter jumlah data yang ditampilkan">
        <select id="masterEntriesSelect" name="entries" class="master-entries-select js-show-entries-select" data-skip-placeholder="true" aria-label="Show Entries">
            <option value="10" {% if has_entries_filter and selected_entries == '10' %}selected{% endif %}>10</option>
            <option value="25" {% if selected_entries == '25' %}selected{% endif %}>25</option>
            <option value="50" {% if selected_entries == '50' %}selected{% endif %}>50</option>
            <option value="100" {% if selected_entries == '100' %}selected{% endif %}>100</option>
            <option value="all" {% if selected_entries == 'all' %}selected{% endif %}>Semua</option>
        </select>
        <input type="hidden" name="page" value="1">
    </form>

    <p class="master-entries-info">
        {% if total_count %}
            Menampilkan {{ start_index }} - {{ end_index }} dari {{ total_count }} data
        {% else %}
            Menampilkan 0 data
        {% endif %}
    </p>
</div>
